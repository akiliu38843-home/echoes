<!-- 字体：原型用 Noto Serif/Sans SC。生产建议自托管；此处用 CDN + 系统字体兜底（离线/被墙仍可读）。 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  @keyframes ec-draw { from { stroke-dashoffset: 560; } to { stroke-dashoffset: 0; } }
  @keyframes ec-place { 0% { opacity: 0; transform: translateY(-180px); } 68% { opacity: 1; transform: translateY(6px); } 84% { transform: translateY(-2px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes ec-appear { to { opacity: 1; } }
  @keyframes ec-hooklift { 0% { transform: translateY(0); } 45% { transform: translateY(22px); } 70% { transform: translateY(22px); } 100% { transform: translateY(0); } }
  @keyframes ec-trolley { 0% { transform: translateX(0); } 45% { transform: translateX(-58px); } 72% { transform: translateX(-58px); } 100% { transform: translateX(0); } }
  @keyframes ec-swing { 0%, 100% { transform: rotate(-6deg); } 50% { transform: rotate(6deg); } }
  @keyframes ec-sweep { 0%, 100% { transform: rotate(-8deg); } 50% { transform: rotate(7deg); } }
  @keyframes ec-spark { 0% { opacity: 0; transform: scale(0.2); } 25% { opacity: 0.9; } 100% { opacity: 0; transform: scale(2); } }
  @keyframes ec-ping { 0% { opacity: 0.5; transform: scale(0.5); } 70% { opacity: 0; } 100% { opacity: 0; transform: scale(2.5); } }
  @keyframes ec-stamp { 0% { opacity: 0; transform: scale(1.5) rotate(-11deg); } 55% { opacity: 1; transform: scale(0.93) rotate(3deg); } 78% { transform: scale(1.05) rotate(-1deg); } 100% { opacity: 1; transform: scale(1) rotate(0); } }
  @keyframes ec-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.18; } }
  @keyframes ec-fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes ec-rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  @keyframes ec-grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes ec-inL { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: none; } }
  @keyframes ec-inR { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: none; } }
  @keyframes ec-pop { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: none; } }
  @keyframes ec-drop { from { transform: translateX(-0.5px) scaleY(0); } to { transform: translateX(-0.5px) scaleY(1); } }
  @keyframes ec-beat { 0%, 100% { transform: rotate(45deg) scale(1); opacity: 1; } 50% { transform: rotate(45deg) scale(1.55); opacity: 0.45; } }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition-duration: 0.001ms !important; }
  }
  html, body { margin: 0; padding: 0; }
  body { background: #d8dde1; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }

  /* 交互态（原型的 style-hover/focus → 真 CSS） */
  .ec-feedcard { transition: transform .16s ease, background .16s ease, border-color .16s ease, box-shadow .16s ease; }
  .ec-feedcard:hover { background: var(--ec-surface2) !important; border-color: var(--ec-ink3) !important; transform: translateY(-2px); box-shadow: 0 5px 16px rgba(27,38,46,0.09); }
  .ec-btn-dark:hover { opacity: .86; }
  .ec-btn-red:hover { opacity: .88; }
  .ec-heatbtn:hover, .ec-backbtn:hover, .ec-tonebtn:hover { background: var(--ec-line2) !important; }
  .ec-cardhead { transition: background .16s ease; }
  .ec-cardhead:hover { background: var(--ec-surface2); }
  .ec-input:focus { border-color: var(--ec-ink3) !important; }
  .ec-term { border-bottom: 1px dotted #9c3a2c; cursor: help; color: inherit; }
  /* a11y：键盘焦点可见 */
  a:focus-visible, button:focus-visible, input:focus-visible, [tabindex]:focus-visible { outline: 2px solid #9c3a2c; outline-offset: 2px; }
  button { font: inherit; }
</style>
</head>

<script>
"use strict";
const API_BASE = (window.ECHOES_CONFIG && window.ECHOES_CONFIG.apiBase) || "";
// ─────────────────────────────────────────────────────────────

const TONES = {
  '档案暖': { bg:'#e8dfcc', surface:'#f8f3e8', surface2:'#fbf7ee', ink:'#211c15', ink2:'#514838', ink3:'#75694f', ink4:'#9b8d70', line:'#d8cdb2', line2:'#e6dcc4' },
  '冷灰':   { bg:'#d8dde1', surface:'#eef1f3', surface2:'#f6f8f9', ink:'#1b2329', ink2:'#3b464d', ink3:'#65707a', ink4:'#96a1aa', line:'#c6ced4', line2:'#dde2e6' },
  '亮白':   { bg:'#efece4', surface:'#ffffff', surface2:'#fbfaf6', ink:'#1a1a17', ink2:'#43423c', ink3:'#6e6c62', ink4:'#9c998b', line:'#e2ddd0', line2:'#efece1' },
};
const TONE_NAMES = ['冷灰','档案暖','亮白'];
const RED = '#9c3a2c';
const DIM_META = {
  wallet:{label:'钱包',color:'#5f7a5a'}, job:{label:'饭碗',color:'#4f6a86'}, social:{label:'人际',color:'#9a5a4d'},
  identity:{label:'认同',color:'#917a47'}, power:{label:'规则',color:'#6d5f86'}, tempo:{label:'节奏',color:'#4c7a78'},
};
const DIM_ORDER = ['wallet','job','social','identity','power','tempo'];
const DISC = { history:'#4f6a86', economics:'#5f7a5a', politics:'#6d5f86', sociology:'#9a5a4d', anthropology:'#917a47', intl_relations:'#8a5566', central_brain:'#5c6470' };
const EV = { data:['有数据','#4f7a43','#e7eede'], school:['推断','#6b5391','#ece8f2'], history:['史鉴','#9a6a2f','#f1e9d6'] };
const BUILD_STEPS = ['测绘放线 · 校准坐标','基础桩基 · 历史结构','钢结构骨架 · 经济','楼板吊装 · 政治','围护与脚手 · 社会','结构封顶 · 文化 / 综合研判'];
const LENS_DISC = {
  long_durée_structural:'history', contingency_narrative:'history',
  austrian:'economics', monetarist:'economics', keynesian:'economics', rational_expectations:'economics',
  institutional_pe:'politics',
  structural_functional:'sociology', conflict_theory:'sociology',
  cultural_values:'anthropology', interpretive_structural:'anthropology',
  realist_power_transition:'intl_relations', liberal_institutionalism:'intl_relations', realist:'intl_relations', liberal:'intl_relations',
  central_brain:'central_brain',
};
function lensToDisc(id){ return LENS_DISC[id] || 'central_brain'; }

// ── 状态 ──────────────────────────────────────────────────────
const state = {
  screen: 'feed',          // feed | report | debate
  events: [], live: false,
  report: null, expanded: null,
  heat: {},                // idx → {open, loading, pts}
  loading: false, loadingLabel: '', buildStep: 0,
  error: null, lastEvent: null,
  gloss: null,
  tone: (function(){ try { return localStorage.getItem('ec-tone') || '冷灰'; } catch(e){ return '冷灰'; } })(),
  customText: '',
  latin: true,
};
let GLOSSARY = null, MATCHER = [];
let _stepTimer = null, _heatSeq = Promise.resolve();

// ── 工具 ──────────────────────────────────────────────────────
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function clampInt(v,lo,hi){ v = parseInt(v,10); if(isNaN(v)) v=lo; return Math.max(lo,Math.min(hi,v)); }
function pad2(n){ return String(n).padStart(2,'0'); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function shortDate(s){ try{ const d=new Date(s); if(!isNaN(d)) return (d.getMonth()+1)+'/'+d.getDate(); }catch(e){} return String(s||'').slice(0,16); }

async function fetchJSON(url, opts, timeoutMs){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), timeoutMs||20000);
  try {
    const res = await fetch(url, Object.assign({ signal: ctrl.signal }, opts||{}));
    if(!res.ok) throw new Error('HTTP '+res.status);
    return await res.json();
  } finally { clearTimeout(t); }
}

// ── 自绘图标（线性几何，1.6px 描边）→ SVG 字符串 ──────────────
function svgWrap(inner, color, size, sw){
  return `<svg width="${size}" height="${size}" viewBox="0 0 20 20" fill="none" stroke="${color}" stroke-width="${sw||1.6}" stroke-linecap="round" stroke-linejoin="round" style="display:block;flex:0 0 auto" aria-hidden="true">${inner}</svg>`;
}
function dimIcon(key, color, size){
  let p;
  switch(key){
    case 'wallet':   p = `<rect x="3" y="5.5" width="14" height="10" rx="1.8"/><path d="M3 8.5 H17"/><circle cx="13.5" cy="12" r="1" fill="${color}" stroke="none"/>`; break;
    case 'job':      p = `<path d="M3.5 9 A6.5 6.5 0 0 0 16.5 9 Z"/><path d="M2.5 9 H17.5"/><path d="M10 3 V4.6"/>`; break;
    case 'social':   p = `<circle cx="7.5" cy="10" r="3.7"/><circle cx="12.5" cy="10" r="3.7"/>`; break;
    case 'identity': p = `<rect x="4" y="4" width="12" height="12" rx="2"/><circle cx="10" cy="8.4" r="1.8"/><path d="M6.9 14 A3.4 3.4 0 0 1 13.1 14"/>`; break;
    case 'power':    p = `<path d="M3.5 8 L10 4 L16.5 8"/><path d="M5.6 8.5 V14.5 M10 8.5 V14.5 M14.4 8.5 V14.5"/><path d="M3.5 15.5 H16.5"/>`; break;
    case 'tempo':    p = `<path d="M5 4 H15 L10 10 Z"/><path d="M5 16 H15 L10 10 Z"/>`; break;
    default:         p = `<circle cx="10" cy="10" r="6"/>`;
  }
  return svgWrap(p, color, size||18, 1.6);
}
function evIcon(tag, color, size){
  let p;
  switch(tag){
    case 'data':    p = `<path d="M4 16 H16"/><path d="M6.5 16 V11"/><path d="M10 16 V5.5"/><path d="M13.5 16 V9"/>`; break;
    case 'history': p = `<path d="M4 6 H16"/><path d="M4 10 H14"/><path d="M4 14 H11.5"/>`; break;
    default:        p = `<circle cx="10" cy="10" r="6"/><path d="M10 5 L12 10 L10 15 L8 10 Z"/>`;
  }
  return svgWrap(p, color, size||12, 1.7);
}
function evInfo(tag){ const t = EV[tag]||EV.school; return { iconEl: evIcon(EV[tag]?tag:'school', t[1], 12), label:t[0], fg:t[1], bg:t[2] }; }

// ── 名词释义：把正文文本 → 带 .ec-term 的 HTML（每词全篇首现一次） ──
function termify(text){
  if(!text) return '';
  if(!MATCHER.length) return esc(text);
  const used = new Set(); let out = ''; let i = 0;
  while(i < text.length){
    let best=null, bi=Infinity;
    for(const t of MATCHER){ if(used.has(t.std)) continue; const idx=text.indexOf(t.match,i); if(idx!==-1 && idx<bi){ bi=idx; best=t; } }
    if(!best){ out += esc(text.slice(i)); break; }
    used.add(best.std);
    if(bi>i) out += esc(text.slice(i,bi));
    out += `<span class="ec-term" data-action="term" data-std="${esc(best.std)}" tabindex="0" role="button">${esc(text.slice(bi,bi+best.match.length))}</span>`;
    i = bi + best.match.length;
  }
  return out;
}

// ── 热度 sparkline ────────────────────────────────────────────
function sparklineSVG(pts){
  const vals = pts.map(p=>p.value||0);
  const max = Math.max.apply(null, vals.concat([1])), min = Math.min.apply(null, vals);
  const W=168, H=34, n=vals.length;
  const coords = vals.map((v,i)=>{ const x=(i/(n-1))*W; const y=H-((v-min)/((max-min)||1))*(H-6)-3; return x.toFixed(1)+','+y.toFixed(1); }).join(' ');
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block" aria-hidden="true"><polyline points="${coords}" fill="none" stroke="${RED}" stroke-width="1.5"/></svg>`;
}
function trendHTML(pts){
  const v = pts.map(p=>p.value||0), half=Math.floor(v.length/2);
  const early=v.slice(0,half).reduce((a,b)=>a+b,0)/(half||1), late=v.slice(half).reduce((a,b)=>a+b,0)/((v.length-half)||1);
  let txt='→ 平稳', col='#75694f';
  if(late>early*1.3){ txt='↑ 发酵中'; col='#a8443a'; } else if(late<early*0.7){ txt='↓ 降温中'; col='#4f7a43'; }
  return `<span style="font-family:ui-monospace,'SF Mono',monospace;font-size:11px;color:${col};font-weight:600">${txt}</span>`;
}

// ── data_anchors 渲染（契约 v2 = 对象数组；兼容历史字符串） ──────
function anchorText(a){
  if(typeof a === 'string') return a;
  if(a && typeof a === 'object'){ const head=[a.country,a.indicator].filter(Boolean).join('·'); return head + (a.value?(head?' ':'')+a.value:''); }
  return '';
}

// ── 施工蓝图 loading 场景（SVG 字符串） ───────────────────────
function buildScene(){
  const INK='#3f474e', FAINT='#9aa3ab', WIN='#c6cdd3', DARK='#2c333a';
  const G=200, TOP=44, COLS=[100,132,164];
  const lvl = L => G-26*L;
  const TX0=COLS[0], TX1=COLS[2], TW=TX1-TX0, CX=(TX0+TX1)/2;
  const draw=(d,du)=>`stroke-dasharray:560;animation:ec-draw ${du||0.55}s ease ${d}s both`;
  const appear=(d,du)=>`animation:ec-appear ${du||0.35}s ease ${d}s both`;
  const place=d=>`animation:ec-place 0.7s cubic-bezier(.2,.85,.3,1.15) ${d}s both`;
  const mono=s=>`font-family:ui-monospace,'SF Mono',monospace;font-size:${s||7.5}px;letter-spacing:0.04em`;
  const P=(d,stroke,w,style)=>`<path d="${d}" stroke="${stroke}" stroke-width="${w}"${style?` style="${style}"`:''}/>`;
  let s='';
  const crop=(x,y,dx,dy)=>{ s+=P(`M${x} ${y} h${dx}`,INK,1,'opacity:0.6'); s+=P(`M${x} ${y} v${dy}`,INK,1,'opacity:0.6'); };
  crop(6,6,14,14); crop(284,6,-14,14); crop(6,246,14,-14); crop(284,246,-14,-14);
  s+=`<text x="282" y="16" text-anchor="end" fill="${FAINT}" style="${mono(7.5)};${appear(0.25)}">SECT. B–B</text>`;
  s+=`<text x="282" y="242" text-anchor="end" fill="${FAINT}" style="${mono(7.5)};${appear(2.9)}">SCALE 1:200</text>`;
  // north compass
  s+=`<g style="${appear(0.15)}"><circle cx="26" cy="32" r="8" fill="none" stroke="${FAINT}" stroke-width="1"/>${P('M26 38 L26 24 L23 29 M26 24 L29 29',FAINT,1)}<text x="26" y="18" text-anchor="middle" fill="${FAINT}" style="${mono(7)}">N</text></g>`;
  // ground + hatch + piles
  s+=P(`M30 ${G} H262`,INK,1.6,draw(0.05,0.75));
  for(let i=0;i<12;i++) s+=P(`M${48+i*17} ${G} l-6 8`,FAINT,1,draw(0.1+i*0.02,0.4));
  COLS.forEach((x,i)=>{ s+=P(`M${x} ${G} V${G+18}`,INK,1.4,draw(0.22+i*0.06,0.4)); s+=P(`M${x-6} ${G+18} H${x+6}`,FAINT,1,draw(0.32+i*0.06,0.3)); });
  // skeleton: columns + beams + bracing + rivets/sparks
  COLS.forEach((x,i)=> s+=P(`M${x} ${G} V${TOP}`,INK,1.6,draw(0.4+i*0.08,0.85)));
  for(let L=1;L<=6;L++) s+=P(`M${TX0} ${lvl(L)} H${TX1}`,INK,1.5,draw(0.55+L*0.12,0.5));
  s+=P(`M${COLS[0]} ${lvl(0)} L${COLS[1]} ${lvl(2)}`,FAINT,1.1,draw(1.0,0.4));
  s+=P(`M${COLS[1]} ${lvl(0)} L${COLS[0]} ${lvl(2)}`,FAINT,1.1,draw(1.05,0.4));
  COLS.forEach((x,i)=>{ for(let L=0;L<=6;L++){ const rd=0.7+L*0.1;
    s+=`<rect x="${x-2.3}" y="${lvl(L)-2.3}" width="4.6" height="4.6" fill="${INK}" transform="rotate(45 ${x} ${lvl(L)})" style="${appear(rd)}"/>`;
    s+=`<circle cx="${x}" cy="${lvl(L)}" r="4.5" fill="none" stroke="${RED}" stroke-width="1.2" style="transform-box:fill-box;transform-origin:center;animation:ec-spark 0.55s ease ${rd}s both"/>`; } });
  // floor cladding
  for(let L=1;L<=6;L++){ const top=lvl(L)+2;
    s+=`<g style="${place(1.05+L*0.16)}"><rect x="${TX0+4}" y="${top}" width="${TW-8}" height="22" fill="rgba(255,255,255,0.5)" stroke="${INK}" stroke-width="1.3"/><rect x="${TX0+10}" y="${top+7}" width="12" height="8" fill="${WIN}"/><rect x="${TX0+26}" y="${top+7}" width="12" height="8" fill="${WIN}"/><rect x="${TX0+42}" y="${top+7}" width="12" height="8" fill="${WIN}"/></g>`; }
  // roof + beacon + ping
  s+=`<g style="${place(2.55)}"><polygon points="${TX0} ${TOP} ${TX1} ${TOP} ${CX} ${TOP-18}" fill="rgba(255,255,255,0.5)" stroke="${INK}" stroke-width="1.5"/></g>`;
  s+=`<g style="animation:ec-appear 0.3s ease 2.8s both, ec-blink 1.7s ease-in-out 3.1s infinite">${P(`M${CX} ${TOP-18} V${TOP-30}`,INK,1.2)}<rect x="${CX-5}" y="${TOP-35}" width="10" height="10" fill="${RED}" transform="rotate(45 ${CX} ${TOP-30})"/></g>`;
  s+=`<circle cx="${CX}" cy="${TOP-30}" r="8" fill="none" stroke="${RED}" stroke-width="1.2" style="transform-box:fill-box;transform-origin:center;animation:ec-ping 2.4s ease-out 3.2s infinite"/>`;
  // scaffold
  let sc=P('M86 '+G+' V'+lvl(6),FAINT,1)+P('M96 '+G+' V'+lvl(6),FAINT,1);
  for(let L=0;L<=6;L++) sc+=P(`M86 ${lvl(L)} H96`,FAINT,1);
  for(let L=1;L<=6;L++) sc+=P(`M86 ${lvl(L)} L96 ${lvl(L-1)}`,FAINT,0.8);
  for(let L=1;L<=6;L++) sc+=P(`M96 ${lvl(L)} H${TX0}`,FAINT,0.8);
  s+=`<g style="${appear(1.35,0.7)}">${sc}</g>`;
  // tower crane
  const M0=224,M1=234,MT=34,JT=38,JB=50,JEND=108,CEND=256,CAT=(M0+M1)/2;
  let cr=P(`M${M0} ${G} V${MT}`,INK,1.5)+P(`M${M1} ${G} V${MT}`,INK,1.5);
  for(let y=G;y>=MT+12;y-=16) cr+=P(`M${M0} ${y} H${M1}`,FAINT,0.9);
  let zig=''; for(let y=G;y>MT;y-=16) zig+=`M${M0} ${y} L${M1} ${y-16} `; cr+=P(zig,FAINT,0.8);
  cr+=P(`M${M0} ${MT} L${CAT} ${MT-14} L${M1} ${MT}`,INK,1.3);
  cr+=P(`M${M1} ${JT} H${JEND}`,INK,1.4)+P(`M${M0} ${JB} H${JEND+4}`,INK,1.2)+P(`M${JEND} ${JT} L${JEND+4} ${JB}`,INK,1.2);
  let jz=''; for(let x=M0;x>JEND;x-=16) jz+=`M${x} ${JB} L${x-16} ${JT} `; cr+=P(jz,FAINT,0.8);
  cr+=P(`M${M0} ${JT} H${CEND}`,INK,1.4)+P(`M${M1} ${JB} H${CEND}`,INK,1.2);
  cr+=`<rect x="${CEND-16}" y="${JT+2}" width="16" height="16" fill="${DARK}"/>`;
  cr+=P(`M${CAT} ${MT-14} L${JEND+6} ${JT}`,FAINT,0.9)+P(`M${CAT} ${MT-14} L${CEND-4} ${JT}`,FAINT,0.9);
  s+=`<g style="${appear(0.1,0.6)}">${cr}</g>`;
  s+=`<g style="animation:ec-appear 0.3s ease 0.7s both, ec-trolley 3.4s ease-in-out 1.0s infinite"><rect x="190" y="46" width="12" height="6" fill="${INK}"/><g style="animation:ec-hooklift 3.4s ease-in-out 1.0s infinite">${P('M196 52 V150',INK,1.1)}${P('M192 150 H200',INK,1.1)}<rect x="188" y="150" width="16" height="9" fill="${RED}" style="transform-box:fill-box;transform-origin:50% 0;animation:ec-swing 2.6s ease-in-out infinite"/></g></g>`;
  // theodolite + sightline
  const IX=44,IY=150;
  s+=`<g style="${appear(0.3,0.5)}">${P(`M${IX} ${IY} L34 ${G}`,INK,1.2)}${P(`M${IX} ${IY} L54 ${G}`,INK,1.2)}${P(`M${IX} ${IY} L${IX} ${G}`,FAINT,1)}<rect x="${IX-6}" y="${IY-7}" width="12" height="8" fill="none" stroke="${INK}" stroke-width="1.2"/>${P(`M${IX+6} ${IY-4} H${IX+13}`,INK,1.4)}</g>`;
  s+=`<g style="transform-box:fill-box;transform-origin:0% 100%;animation:ec-appear 0.4s ease 2.7s both, ec-sweep 4s ease-in-out 3.0s infinite">${P(`M${IX+13} ${IY-4} L98 ${lvl(3)}`,FAINT,1,'stroke-dasharray:3 3')}</g>`;
  // dimension lines
  s+=`<g style="${appear(2.65)}">${P(`M74 ${TOP} V${G}`,FAINT,1)}${P(`M70 ${TOP} H78 M70 ${G} H78`,FAINT,1)}<polygon points="74 ${TOP} 71 ${TOP+7} 77 ${TOP+7}" fill="${FAINT}"/><polygon points="74 ${G} 71 ${G-7} 77 ${G-7}" fill="${FAINT}"/><text x="68" y="${(TOP+G)/2+3}" text-anchor="end" fill="${FAINT}" style="${mono(7.5)}">H</text></g>`;
  s+=`<g style="${appear(2.65)}">${P(`M${TX0} 226 H${TX1}`,FAINT,1)}${P(`M${TX0} 222 V230 M${TX1} 222 V230`,FAINT,1)}<polygon points="${TX0} 226 ${TX0+7} 223 ${TX0+7} 229" fill="${FAINT}"/><polygon points="${TX1} 226 ${TX1-7} 223 ${TX1-7} 229" fill="${FAINT}"/><text x="${CX}" y="238" text-anchor="middle" fill="${FAINT}" style="${mono(7.5)}">W</text></g>`;
  // topping-out seal
  const SX=50,SY=104;
  s+=`<g style="transform-box:fill-box;transform-origin:center;animation:ec-stamp 0.6s cubic-bezier(.2,.8,.3,1.2) 3.05s both"><circle cx="${SX}" cy="${SY}" r="19" fill="none" stroke="${RED}" stroke-width="1.6"/><circle cx="${SX}" cy="${SY}" r="14" fill="none" stroke="${RED}" stroke-width="0.7" stroke-dasharray="2 2.5"/><text x="${SX}" y="${SY-1}" text-anchor="middle" fill="${RED}" style="font-family:'Noto Serif SC',serif;font-weight:900;font-size:11px">封顶</text><text x="${SX}" y="${SY+9}" text-anchor="middle" fill="${RED}" style="${mono(4.6)};letter-spacing:0.1em">TOPPED OUT</text></g>`;
  return `<svg width="100%" viewBox="0 0 290 252" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display:block;overflow:visible">${s}</svg>`;
}

function vmEvents(){
  const evs = state.events || [];
  const ordered = evs.slice().sort((a,b)=> DIM_ORDER.indexOf(a.primary||'power') - DIM_ORDER.indexOf(b.primary||'power'));
  return ordered.map((ev,n)=>{
    const realIdx = evs.indexOf(ev);
    const pm = DIM_META[ev.primary] || DIM_META.power;
    const chips = (ev.dimensions || [ev.primary]).filter(Boolean).map(d=>{ const m=DIM_META[d]||DIM_META.power; return { iconEl: dimIcon(d,'#ffffff',13), label:m.label, color:m.color }; });
    return { realIdx, no:pad2(n+1), enter:`ec-rise 0.5s ease ${(0.05*n).toFixed(2)}s both`,
      blurb: ev.blurb || ev.title || '', title: ev.title||'', hasBlurb: !!ev.blurb,
      source: ev.source||'', date: ev.published?shortDate(ev.published):(ev.as_of||''), primaryColor: pm.color, chips };
  });
}
function vmReport(){
  const r = state.report; if(!r) return null;
  const echo = r.echo || {};
  const ym = (echo.historical_label||'').match(/(\d{3,4})\s*年/); const year = ym?ym[1]:'';
  const breakdown = (echo.similarity_breakdown||[]).map(d=>({ dim:d.dimension||'', score:clampInt(d.score,0,100), note:d.note||'' }));
  const mapping = (echo.structural_mapping||[]).map(m=>({ element:m.element||'', then:m.then||'', now:m.now||'', note:m.note||'', ev:evInfo(m.evidence_tag) }));
  const otherEchoes = (echo.other_echoes||[]).map(e=>({ label:e.label||'', sim:e.similarity||'?' }));
  const degraded = (r.status==='degraded') || !!echo._degraded || (Number(echo.similarity)===0 && breakdown.length===0);
  const failReason = ((r.cards||[]).find(c=>c.confidence_note && /失败|超时|不可用/.test(c.confidence_note))||{}).confidence_note || '会诊服务超时';
  const cards = (r.cards||[]).map((c,i)=>{
    const key = c.key||('c'+i);
    const chain = (c.causal_chain||[]).map((s,j)=>({ num:s.step||j+1, cause:s.cause||'', effect:s.effect||'', mech:s.mechanism||'', ground:s.grounding||'' }));
    const byCountry = (c.by_country||[]).filter(x=>x).map(bc=>({ country:bc.country, impact:bc.impact }));
    const anchors = (c.data_anchors||[]).map(anchorText).filter(Boolean);
    const dimColor = (DIM_META[key]||DIM_META.power).color;
    const cardDegraded = degraded || (!c.why && chain.length===0 && !c.tldr);
    return { key, no:pad2(i+1), title:c.title||'', dimColor, iconEl:dimIcon(key,dimColor,18),
      ev:evInfo(c.evidence_tag), tldr:c.tldr||'', headline:c.headline||(cardDegraded?'（分析暂时不可用）':''),
      horizon:c.horizon||'', confPct:Math.round((c.confidence||0)*100), confNote:c.confidence_note||'',
      whyHTML:termify(c.why||''), hasWhy:!!c.why, chain, byCountry, then:c.then||'', anchors,
      degraded:cardDegraded, failNote:c.confidence_note||'会诊未完成' };
  });
  return { presentLabel: echo.present_label||(r.event&&r.event.text)||'', historicalLabel: echo.historical_label||'', year,
    similarity: echo.similarity||0, breakdown, mapping, otherEchoes,
    whyStructuralHTML: termify(echo.why_structural||''), whyNot: echo.why_not_obvious||'',
    uncertainty: (r.meta&&r.meta.uncertainty_note)||'本报告是结构类比与多学派叙事，非投资建议，非未来预测（21-ADR）',
    audience: r.audience||'中国', degraded,
    degradedNote: '本次会诊未能生成结构匹配与维度翻译（'+failReason+'）。可用部分仍照常显示。', cards };
}
function vmDebate(){
  const r = state.report; if(!r) return null;
  const d = r.debate||{}, meta = r.meta||{};
  return { question: d.question||'这件事会怎样影响普通人？',
    voices: (d.voices||[]).map((v,i)=>{ const disc=lensToDisc(v.lens||''); const L=i%2===0; const color=DISC[disc]||DISC.central_brain;
      return { no:pad2(i+1), L, color, label:v.label_zh||v.lens||'', stanceHTML:termify(v.stance||''), anchor:v.data_anchor||'',
        enter:`${L?'ec-inL':'ec-inR'} 0.55s cubic-bezier(.2,.8,.3,1) ${(0.09*i).toFixed(2)}s both` }; }),
    voiceCount:(d.voices||[]).length, crux:d.crux||'',
    synthesisHTML: meta.synthesis_zh?termify(meta.synthesis_zh):'', disclaimer:meta.disclaimer||'', uncertainty:meta.uncertainty_note||'' };
}

function render(){
  const tone = TONES[state.tone] || TONES['冷灰'];
  const app = document.getElementById('app');
  const vars = `--ec-bg:${tone.bg};--ec-surface:${tone.surface};--ec-surface2:${tone.surface2};--ec-ink:${tone.ink};--ec-ink2:${tone.ink2};--ec-ink3:${tone.ink3};--ec-ink4:${tone.ink4};--ec-line:${tone.line};--ec-line2:${tone.line2}`;
  const bg = `linear-gradient(0deg, rgba(27,38,46,0.05) 1px, transparent 1px) 0 -1px / 100% 27px, linear-gradient(90deg, rgba(27,38,46,0.05) 1px, transparent 1px) -1px 0 / 27px 100%, ${tone.bg}`;
  let screen='';
  if(state.screen==='feed') screen=renderFeed();
  else if(state.screen==='report') screen=renderReport();
  else if(state.screen==='debate') screen=renderDebate();
  app.setAttribute('style', `${vars};background:${bg};color:${tone.ink};min-height:100vh;font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif`);
  app.innerHTML = renderTopbar() + screen + renderLoading() + renderError();
  renderGlossPop();
}

// ── 动作路由 ──────────────────────────────────────────────────
function eventByIdx(i){ return state.events[i]; }

document.getElementById('app').addEventListener('click', (e)=>{
  const el = e.target.closest && e.target.closest('[data-action]');
  if(!el) return;
  const a = el.getAttribute('data-action');
  if(a==='home'){ go('feed'); }
  else if(a==='back'){ back(); }
  else if(a==='tone'){ cycleTone(); }
  else if(a==='analyze'){ const ev=eventByIdx(+el.getAttribute('data-idx')); if(ev) analyze(ev); }
  else if(a==='custom-submit'){ customSubmit(); }
  else if(a==='heat'){ e.stopPropagation(); toggleHeat(+el.getAttribute('data-idx')); }
  else if(a==='toggle-card'){ toggleCard(el.getAttribute('data-key')); }
  else if(a==='show-debate'){ go('debate'); }
  else if(a==='term'){ e.stopPropagation(); openGloss(el.getAttribute('data-std'), el); }
  else if(a==='retry'){ if(state.lastEvent){ state.error=null; analyze(state.lastEvent); } }
});
// 键盘可达：Enter/Space 触发卡片/事件/term
document.getElementById('app').addEventListener('keydown', (e)=>{
  if(e.key!=='Enter' && e.key!==' ') return;
  const el = e.target.closest && e.target.closest('[data-action]');
  if(!el) return;
  const a = el.getAttribute('data-action');
  if(['analyze','toggle-card','term','show-debate','custom-submit','retry','tone'].includes(a)){ e.preventDefault(); el.click(); }
});
// 输入框（每次 render 重建，用 input 事件同步 + Enter 提交）
document.getElementById('app').addEventListener('input', (e)=>{ if(e.target.id==='ec-custom') state.customText = e.target.value; });
document.getElementById('app').addEventListener('keydown', (e)=>{ if(e.target.id==='ec-custom' && e.key==='Enter') customSubmit(); });
// 点击空白关释义
document.addEventListener('click', (e)=>{
  if(!state.gloss) return;
  const t=e.target;
  if(t.closest && (t.closest('[data-action="term"]') || t.closest('#gloss-pop'))) return;
  state.gloss=null; renderGlossPop();
}, true);

// ── 行为 ──────────────────────────────────────────────────────
function go(screen){ state.screen=screen; state.gloss=null; render(); window.scrollTo(0,0); }
function back(){ go(state.screen==='debate' ? 'report' : 'feed'); }
function cycleTone(){ const i=TONE_NAMES.indexOf(state.tone); state.tone=TONE_NAMES[(i+1)%TONE_NAMES.length]; try{ localStorage.setItem('ec-tone', state.tone); }catch(e){} render(); }
function toggleCard(key){ state.expanded = state.expanded===key ? null : key; render(); }
function customSubmit(){ const t=(state.customText||'').trim(); if(!t) return; analyze({ title:t, text:t }); }

function openGloss(std, el){
  const entry = (GLOSSARY && GLOSSARY.terms || {})[std]; if(!entry) return;
  const r = el.getBoundingClientRect(); const pw=300, ph=150;
  let x=r.left, y=r.bottom+8;
  if(x+pw>window.innerWidth-12) x=window.innerWidth-pw-12;
  if(x<12) x=12;
  if(y+ph>window.innerHeight-12) y=r.top-ph-8;
  state.gloss = { std, def:entry.def, analogy:entry.analogy, x:Math.round(x), y:Math.round(y) };
  renderGlossPop();
}

function startStepTimer(){
  stopStepTimer();
  // 真后端约 60–90s；6 步 → 每 ~11s 进一步，封顶停最后一步
  _stepTimer = setInterval(()=>{ if(state.buildStep < BUILD_STEPS.length-1){ state.buildStep++; render(); } }, 11000);
}
function stopStepTimer(){ if(_stepTimer){ clearInterval(_stepTimer); _stepTimer=null; } }

async function analyze(ev){
  const label = (ev.text || ev.title || ev.blurb || '').slice(0,80);
  state.loading=true; state.error=null; state.lastEvent=ev; state.loadingLabel=label; state.buildStep=0; state.gloss=null;
  render(); startStepTimer();
  try {
    const report = await fetchJSON(API_BASE+'/api/life-report', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text: ev.text||ev.title||'', as_of: ev.as_of||todayISO(), mode:'current' }),
    }, 150000);
    stopStepTimer();
    state.report=report; state.screen='report'; state.loading=false; state.expanded=null;
    render(); window.scrollTo(0,0);
  } catch(err){
    stopStepTimer();
    state.loading=false;
    state.error = (err && err.name==='AbortError') ? '请求超时（超过 150 秒）。' : ('网络/服务异常：'+esc(err && err.message || String(err)));
    render();
  }
}

function toggleHeat(idx){
  const cur = state.heat[idx];
  if(cur && cur.open){ state.heat[idx]={...cur, open:false}; render(); return; }
  if(cur && cur.pts){ state.heat[idx]={...cur, open:true}; render(); return; }
  state.heat[idx]={ open:true, loading:true }; render();
  // 串行排队（GDELT 限流 1req/5s 友好）
  _heatSeq = _heatSeq.then(async ()=>{
    const ev = state.events[idx]; const q = ev ? (ev.title||ev.blurb||'') : '';
    try {
      const data = await fetchJSON(API_BASE+'/api/heat?q='+encodeURIComponent(q), null, 30000);
      state.heat[idx]={ open:true, loading:false, pts:data.points||[] };
    } catch(e){ state.heat[idx]={ open:true, loading:false, pts:[] }; }
    render();
  });
}

// ── 初始化 ────────────────────────────────────────────────────
async function init(){
  render();
  try {
    const [tr, gl] = await Promise.all([
      fetchJSON(API_BASE+'/api/trending', null, 30000).catch(()=>({events:[],live:false})),
      fetchJSON(API_BASE+'/api/glossary', null, 15000).catch(()=>null),
    ]);
    if(gl){
      GLOSSARY = gl;
      const all = Object.keys(gl.terms||{}).map(k=>({match:k,std:k}))
        .concat(Object.keys(gl.aliases||{}).map(a=>({match:a,std:gl.aliases[a]})));
      all.sort((a,b)=>b.match.length-a.match.length);
      MATCHER = all;
    }
    state.events = tr.events||[]; state.live = !!tr.live; state.eventsLoaded=true;
  } catch(e){ state.eventsLoaded=true; }
  render();
}
init();
</script>
